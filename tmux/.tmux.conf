# カーソルのちらつき対策: 同期レンダリング(CSI ?2026)を有効化
set -g default-terminal "tmux-256color"
set -as terminal-features ",xterm-256color:Sync,tmux-256color:Sync,*:Sync"

# 256色 / TrueColor
set -ga terminal-overrides ",*:Tc"

# 背景をターミナルのデフォルト(=透明)にして WezTerm の透過を活かす
set -g window-style "bg=default"
set -g window-active-style "bg=default"
